name: Deploy web demo to GitHub Pages

on:
  # Deploy on every push to main…
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'packages/viewer/**'
      - 'content/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-pages.yml'
  # …and allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions Pages deploys need.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (public site)
        # Project site is served at https://<user>.github.io/VR-Museum-SSO/,
        # so assets + content must resolve under that sub-path.
        env:
          VITE_BASE_URL: /VR-Museum-SSO/
        run: pnpm --filter web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
