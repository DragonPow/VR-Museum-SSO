<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Phòng Truyền Thống Ảo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
      html, body, #root { height: 100%; overflow: hidden; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #0a0804;
        color: #f0e8d8;
        font-size: 14px;
        line-height: 1.5;
      }
      button { font-family: inherit; cursor: pointer; }
      input, select, textarea { font-family: inherit; font-size: 13px; color: #f0e8d8; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #3a2e1e; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #5a4a30; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
