name = "virtual-museum-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "virtual-museum-media"

[vars]
ALLOWED_ORIGIN = "https://YOUR-ADMIN-DOMAIN.pages.dev"

